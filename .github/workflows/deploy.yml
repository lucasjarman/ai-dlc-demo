name: Build, Scan & Deploy

on:
  workflow_dispatch:
  # push trigger re-enable once GH secrets are set:
  # GCP_SA_KEY, WIZ_CLIENT_ID, WIZ_CLIENT_SECRET, WIZ_REGISTRY_USERNAME, WIZ_REGISTRY_PASSWORD
  # push:
  #   branches: [main]
  #   paths:
  #     - 'app/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: ai-dlc-demo
  SERVICE: ai-dlc-demo

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # Login to Wiz registry to pull the Runtime Sensor image in the Docker build
      - name: Login to Wiz registry
        uses: docker/login-action@v3
        with:
          registry: wizio.azurecr.io
          username: ${{ secrets.WIZ_REGISTRY_USERNAME }}
          password: ${{ secrets.WIZ_REGISTRY_PASSWORD }}

      - name: Build image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" ./app
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # wizcli image scan — posts findings to Wiz platform and evaluates CI/CD policy.
      # Non-blocking (--exit-code 0 or no --policies flag) so build continues with findings.
      # The separate 'wizcli tag' step below creates the code-to-cloud mapping in Wiz.
      - name: Install wizcli
        run: |
          curl -fsSLo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      - name: Wiz image scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "${{ steps.build.outputs.image }}" \
            --output table

      - name: Push image to Artifact Registry
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      # wizcli tag — links the pushed image digest to the scan result in Wiz,
      # enabling code-to-cloud tracing (CVE → image → repo commit → source file).
      - name: Wiz tag image for code-to-cloud mapping
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli tag "${{ steps.build.outputs.image }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --quiet
