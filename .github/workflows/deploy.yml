name: Build, Scan & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: ai-dlc-demo

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      # Login to Wiz registry — needed to pull the Runtime Sensor in the Docker build stage
      - name: Login to Wiz registry
        uses: docker/login-action@v3
        with:
          registry: wizio.azurecr.io
          username: ${{ secrets.WIZ_REGISTRY_USERNAME }}
          password: ${{ secrets.WIZ_REGISTRY_PASSWORD }}

      - name: Build image
        id: build
        run: |
          IMAGE="gcr.io/${{ env.PROJECT_ID }}/ai-dlc-demo/app:${{ github.sha }}"
          docker build --platform linux/amd64 -t "$IMAGE" -t "gcr.io/${{ env.PROJECT_ID }}/ai-dlc-demo/app:latest" ./app
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Install wizcli
        run: |
          curl -fsSLo wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli

      # Scan the LOCAL image before pushing.
      # Findings are reported to Wiz automatically (Findings > Code & Build Scans).
      # continue-on-error keeps the pipeline running even if a policy would fail —
      # for this demo we want findings visible in Wiz without blocking deploys.
      - name: Wiz image scan
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli scan container-image "${{ steps.build.outputs.image }}" \
            --policies "Default vulnerabilities policy - [dmoloney]" \
            --policies "Default secrets policy" \
            --policies "Default sensitive data policy" \
            --policies "Default software license policy"

      - name: Push image to GCR
        run: |
          docker push "${{ steps.build.outputs.image }}"
          docker push "gcr.io/${{ env.PROJECT_ID }}/ai-dlc-demo/app:latest"

      # Tag AFTER push — wizcli reads the registry digest to create the
      # code-to-cloud link: CVE in running Cloud Run → image digest → this commit.
      # GitHub Actions env vars (GITHUB_SHA, GITHUB_REPOSITORY, etc.) are read
      # automatically by wizcli for the code stage metadata.
      - name: Wiz tag image for code-to-cloud mapping
        continue-on-error: true
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          ./wizcli tag "${{ steps.build.outputs.image }}"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --quiet
