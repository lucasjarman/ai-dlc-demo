name: Build, Scan & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: ai-dlc-demo
  SERVICE: ai-dlc-demo

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build image
        id: build
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/app:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${IMAGE%:*}:latest" ./app
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      # wizcli image scan — produces code-to-cloud mapping in Wiz
      # This links CVEs and secrets found in the image back to this repo + commit
      - name: Install wizcli
        run: |
          curl -sLo wizcli https://downloads.wiz.io/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          sudo mv wizcli /usr/local/bin/

      - name: Wiz image scan
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          wizcli auth --id "$WIZ_CLIENT_ID" --secret "$WIZ_CLIENT_SECRET"
          # Scan the image — non-blocking (--exit-code 0) so build continues even with findings.
          # Findings are reported to the Wiz platform for code-to-cloud tracing.
          wizcli docker scan \
            --image "${{ steps.build.outputs.image }}" \
            --tag "repo=${{ github.repository }},commit=${{ github.sha }},branch=${{ github.ref_name }}" \
            --output table \
            --exit-code 0

      - name: Push image to Artifact Registry
        run: |
          IMAGE="${{ steps.build.outputs.image }}"
          docker push "$IMAGE"
          docker push "${IMAGE%:*}:latest"

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE }} \
            --image "${{ steps.build.outputs.image }}" \
            --region ${{ env.REGION }} \
            --quiet
