apiVersion: v1
kind: Namespace
metadata:
  name: ai-dlc-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
  annotations:
    iam.gke.io/gcp-service-account: ai-dlc-demo-sa@PROJECT_ID_PLACEHOLDER.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-dlc-demo
  template:
    metadata:
      labels:
        app: ai-dlc-demo
    spec:
      serviceAccountName: ai-dlc-demo
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: DATA_BUCKET
              value: PROJECT_ID_PLACEHOLDER-customer-data
            - name: WIZ_API_CLIENT_ID
              value: WIZ_SENSOR_CLIENT_ID_PLACEHOLDER
            - name: WIZ_API_CLIENT_SECRET
              value: WIZ_SENSOR_CLIENT_SECRET_PLACEHOLDER
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# SECURITY ISSUE: Public LoadBalancer — no auth, no TLS
apiVersion: v1
kind: Service
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
spec:
  type: LoadBalancer
  selector:
    app: ai-dlc-demo
  ports:
    - port: 80
      targetPort: 8080
