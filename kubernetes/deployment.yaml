apiVersion: v1
kind: Namespace
metadata:
  name: ai-dlc-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
  annotations:
    iam.gke.io/gcp-service-account: ai-dlc-demo-sa@PROJECT_ID_PLACEHOLDER.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-dlc-demo
  template:
    metadata:
      labels:
        app: ai-dlc-demo
    spec:
      serviceAccountName: ai-dlc-demo
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER
          # Override the image's ENTRYPOINT (wiz-sensor serverless wrapper) — that sensor
          # variant only supports ECS/EKS Fargate, ACA, and Cloud Run, not Kubernetes.
          # Runtime detection on this cluster comes from the Wiz DaemonSet sensor (namespace: wiz)
          # instead, which monitors every pod via eBPF regardless of what's in the container.
          command: ["uvicorn"]
          args: ["main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports:
            - containerPort: 8080
          env:
            - name: DATA_BUCKET
              value: PROJECT_ID_PLACEHOLDER-customer-data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
# SECURITY ISSUE: Public LoadBalancer — no auth, no TLS
apiVersion: v1
kind: Service
metadata:
  name: ai-dlc-demo
  namespace: ai-dlc-demo
spec:
  type: LoadBalancer
  selector:
    app: ai-dlc-demo
  ports:
    - port: 80
      targetPort: 8080
